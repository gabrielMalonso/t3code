<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Annotations Simple Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #f1eeea;
        color: #211923;
      }

      main {
        padding: 64px;
      }

      .dashboard {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
      }

      .panel,
      .card {
        border: 1px solid #d7cfd5;
        border-radius: 8px;
        background: #fffaf5;
        padding: 22px;
      }

      .card h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      .card p {
        max-width: 56ch;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="dashboard">
        <aside class="panel">Navegacao</aside>
        <article class="card primary" data-shot-target="spacing-card">
          <h1>Resumo operacional</h1>
          <p>
            Este card representa uma area que um agente de codigo deve localizar com seletor, texto
            e rect.
          </p>
          <button>Revisar agora</button>
        </article>
      </section>
    </main>
  </body>
</html>
