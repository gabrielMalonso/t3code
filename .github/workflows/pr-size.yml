name: PR Size

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    name: Label PR size
    runs-on: ubuntu-24.04
    concurrency:
      group: pr-size-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Sync PR size label
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.pull_request.number;
            const additions = context.payload.pull_request.additions ?? 0;
            const deletions = context.payload.pull_request.deletions ?? 0;
            const changedLines = additions + deletions;
            const isIntegrationPermissionError = (error) =>
              error?.status === 403 &&
              (error?.response?.data?.message ?? error?.message ?? "").includes(
                "Resource not accessible by integration",
              );

            const managedLabels = [
              {
                name: "size:XS",
                color: "0e8a16",
                description: "0-9 changed lines (additions + deletions).",
              },
              {
                name: "size:S",
                color: "5ebd3e",
                description: "10-29 changed lines (additions + deletions).",
              },
              {
                name: "size:M",
                color: "fbca04",
                description: "30-99 changed lines (additions + deletions).",
              },
              {
                name: "size:L",
                color: "fe7d37",
                description: "100-499 changed lines (additions + deletions).",
              },
              {
                name: "size:XL",
                color: "d93f0b",
                description: "500-999 changed lines (additions + deletions).",
              },
              {
                name: "size:XXL",
                color: "b60205",
                description: "1,000+ changed lines (additions + deletions).",
              },
            ];

            const managedLabelNames = new Set(managedLabels.map((label) => label.name));

            const resolveSizeLabel = (totalChangedLines) => {
              if (totalChangedLines < 10) {
                return "size:XS";
              }

              if (totalChangedLines < 30) {
                return "size:S";
              }

              if (totalChangedLines < 100) {
                return "size:M";
              }

              if (totalChangedLines < 500) {
                return "size:L";
              }

              if (totalChangedLines < 1000) {
                return "size:XL";
              }

              return "size:XXL";
            };

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (
                  existing.color !== label.color ||
                  (existing.description ?? "") !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (isIntegrationPermissionError(error)) {
                  core.warning(
                    `Skipping PR size label definition sync: ${error.message}`,
                  );
                  return;
                }

                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } catch (createError) {
                  if (isIntegrationPermissionError(createError)) {
                    core.warning(
                      `Skipping PR size label definition sync: ${createError.message}`,
                    );
                    return;
                  }

                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            }

            const nextLabelName = resolveSizeLabel(changedLines);

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            for (const label of currentLabels) {
              if (!managedLabelNames.has(label.name) || label.name === nextLabelName) {
                continue;
              }

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label.name,
                });
              } catch (removeError) {
                if (isIntegrationPermissionError(removeError)) {
                  core.warning(
                    `Skipping PR size label sync for #${issueNumber}: ${removeError.message}`,
                  );
                  return;
                }

                if (removeError.status !== 404) {
                  throw removeError;
                }
              }
            }

            if (!currentLabels.some((label) => label.name === nextLabelName)) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [nextLabelName],
                });
              } catch (addError) {
                if (isIntegrationPermissionError(addError)) {
                  core.warning(
                    `Skipping PR size label sync for #${issueNumber}: ${addError.message}`,
                  );
                  return;
                }

                throw addError;
              }
            }

            core.info(`PR #${issueNumber}: ${changedLines} changed lines -> ${nextLabelName}`);
