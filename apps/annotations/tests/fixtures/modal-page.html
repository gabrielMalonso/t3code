<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Annotations Modal Fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #e8e4df;
        color: #24151e;
      }

      .scrim {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(36, 21, 30, 0.24);
      }

      .dialog {
        width: 420px;
        border: 1px solid #d6cbd2;
        border-radius: 8px;
        background: #fffaf5;
        padding: 18px;
        box-shadow: 0 20px 48px rgba(36, 21, 30, 0.22);
      }
    </style>
  </head>
  <body>
    <div class="scrim" data-testid="modal">
      <section class="dialog" role="dialog" aria-modal="true">
        <h1>Preferencias de captura</h1>
        <p>Conteudo dentro de modal usado para testar focus traps.</p>
        <button class="target" data-shot-target="modal-button">Selecionar plano</button>
      </section>
    </div>
    <script>
      const modal = document.querySelector('[data-testid="modal"]');
      const dialog = document.querySelector(".dialog");

      document.addEventListener("focusin", (event) => {
        if (!dialog.contains(event.target)) modal.hidden = true;
      });
    </script>
  </body>
</html>
