<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Annotations Native Dialog Fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #e8e4df;
        color: #24151e;
      }

      dialog {
        width: 420px;
        border: 1px solid #d6cbd2;
        border-radius: 12px;
        background: #fffaf5;
        padding: 22px;
        box-shadow: 0 20px 48px rgba(36, 21, 30, 0.22);
      }

      dialog::backdrop {
        background: rgba(36, 21, 30, 0.34);
      }

      .target {
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <dialog id="native-dialog" aria-label="Preferencias de captura">
      <h1>Preferencias de captura</h1>
      <p>Conteudo dentro de modal nativo usado para testar top layer.</p>
      <button class="target" data-shot-target="native-dialog-button">Selecionar plano</button>
    </dialog>
    <script>
      const dialog = document.querySelector("#native-dialog");
      dialog.showModal();
    </script>
  </body>
</html>
